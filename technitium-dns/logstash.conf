input {
  beats {
    port => 5044
  }
}

filter {
  # Grok pattern to match Technitium v14.3 log format
  grok {
    match => { "message" => "\[%{TIMESTAMP_ISO8601:timestamp}\] \[%{IP:client_ip}:%{POSINT:port}\] %{WORD:protocol} %{WORD:action}: %{HOSTNAME:query_domain}\. %{WORD:class} %{WORD:record_type}" }
  }
  
  # Optional: Convert the timestamp to an actual Date field
  date {
    match => [ "timestamp", "yyyy-MM-dd HH:mm:ss" ]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "technitium-dns-%{+YYYY.MM.dd}"
  }
}
