<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Store - Shop</title>
    <link rel="stylesheet" href="">
    <!-- Firebase CDN -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>
<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
}

.container {
    max-width: 1200px;
    margin: 0 auto;
    background: white;
    border-radius: 15px;
    padding: 30px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
    padding-bottom: 20px;
    border-bottom: 2px solid #eee;
}

h1 {
    color: #333;
    font-size: 2.5em;
}

#auth-section button {
    padding: 10px 20px;
    margin-left: 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
}

#login-btn {
    background: #4CAF50;
    color: white;
}

#register-btn {
    background: #2196F3;
    color: white;
}

#logout-btn {
    background: #f44336;
    color: white;
}

.modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.5);
}

.modal-content {
    background-color: white;
    margin: 10% auto;
    padding: 30px;
    border-radius: 10px;
    width: 90%;
    max-width: 400px;
    position: relative;
}

.close {
    position: absolute;
    right: 20px;
    top: 10px;
    font-size: 28px;
    cursor: pointer;
    color: #888;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: 1px solid #ddd;
    border-radius: 5px;
    font-size: 16px;
}

.modal-content button {
    width: 100%;
    padding: 12px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
}

.phones-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
    margin-top: 20px;
}

.phone-card {
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 20px;
    transition: transform 0.3s, box-shadow 0.3s;
    background: white;
}

.phone-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.phone-card img {
    width: 100%;
    height: 150px;
    object-fit: contain;
    margin-bottom: 15px;
}

.phone-card h3 {
    margin: 10px 0;
    color: #333;
}

.phone-card .price {
    color: #e91e63;
    font-size: 1.2em;
    font-weight: bold;
    margin: 10px 0;
}

.phone-card .stock {
    color: #666;
    margin: 10px 0;
}

.phone-card button {
    width: 100%;
    padding: 10px;
    background: #2196F3;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 14px;
    margin-top: 10px;
}

.phone-card button:disabled {
    background: #ccc;
    cursor: not-allowed;
}

.cart-icon {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #ff5722;
    color: white;
    padding: 15px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

#cart-count {
    position: absolute;
    top: -5px;
    right: -5px;
    background: #f44336;
    color: white;
    border-radius: 50%;
    padding: 2px 8px;
    font-size: 12px;
}

#cart-items {
    max-height: 300px;
    overflow-y: auto;
    margin: 20px 0;
}

.cart-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px;
    border-bottom: 1px solid #eee;
}

.order-card {
    background: #f5f5f5;
    border-radius: 10px;
    padding: 15px;
    margin: 10px 0;
}

.order-card h4 {
    color: #333;
    margin-bottom: 10px;
}

.order-item {
    display: flex;
    justify-content: space-between;
    padding: 5px 0;
}

.order-total {
    font-weight: bold;
    color: #e91e63;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 2px solid #ddd;
}
</style>
<body>
    <div class="container">
        <header>
            <h1>📱 Phone Store</h1>
            <div id="auth-section">
                <button id="login-btn">Login</button>
                <button id="register-btn">Register</button>
                <button id="logout-btn" style="display:none">Logout</button>
                <span id="user-email" style="margin-left: 10px;"></span>
            </div>
        </header>

        <!-- Auth Modals -->
        <div id="login-modal" class="modal" style="display:none;">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>Login</h2>
                <input type="email" id="login-email" placeholder="Email">
                <input type="password" id="login-password" placeholder="Password">
                <button id="login-submit">Login</button>
            </div>
        </div>

        <div id="register-modal" class="modal" style="display:none;">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>Register</h2>
                <input type="email" id="register-email" placeholder="Email">
                <input type="password" id="register-password" placeholder="Password (min 6 chars)">
                <button id="register-submit">Register</button>
            </div>
        </div>

        <!-- Cart Modal -->
        <div id="cart-modal" class="modal" style="display:none;">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>🛒 Your Cart</h2>
                <div id="cart-items"></div>
                <div id="cart-total"></div>
                <button id="checkout-btn">Proceed to Payment</button>
            </div>
        </div>

        <!-- Payment Modal -->
        <div id="payment-modal" class="modal" style="display:none;">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>💳 Payment</h2>
                <div id="payment-summary"></div>
                <p>This is a demo payment. Click "Complete Payment" to simulate purchase.</p>
                <button id="complete-payment">Complete Payment</button>
            </div>
        </div>

        <main>
            <div class="cart-icon" id="cart-icon">
                🛒 <span id="cart-count">0</span>
            </div>
            
            <h2>Available Phones</h2>
            <div id="phones-container" class="phones-grid">
                <p>Loading products...</p>
            </div>
            
            <div id="orders-section" style="display:none; margin-top: 40px;">
                <h2>Your Orders</h2>
                <div id="orders-container"></div>
            </div>
        </main>
    </div>

    <!-- Load customer.js after the HTML is parsed -->
    <script src="customer.js"></script>
</body>
</html>
